spring:
  application:
    name: mcp-server
  main:
    web-application-type: none
    banner-mode: off

splunk:
  base-url: ${SPLUNK_BASE_URL:https://localhost:8089}
  username: ${SPLUNK_USERNAME:admin}
  password: ${SPLUNK_PASSWORD:}
  index: ${SPLUNK_INDEX:tracemind}
  verify-ssl: ${SPLUNK_VERIFY_SSL:false}

spring.ai.mcp.server:
  name: tracemind-mcp-server
  version: 1.0.0
  type: SYNC

logging:
  level:
    root: WARN
